name: meal_planner
description: 家庭の献立をAI（Google Gemini）が提案するプロトタイプアプリ。
publish_to: 'none'
version: 1.0.0-prototype+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  google_generative_ai: ^0.4.6
  flutter_dotenv: ^5.1.0
  table_calendar: ^3.1.2
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  # 献立・在庫・チラシ・設定を端末ローカルへ永続化する（アプリ再起動後も保持）。
  shared_preferences: ^2.2.3
  # 画像から在庫を自動入力するため、フォトライブラリの画像を選択する（SOT-1512）。
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # 起動時スプラッシュと同じ意匠（緑背景＋restaurant_menu）のランチャーアイコンを生成する（SOT-1513）。
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    # GEMINI_API_KEY を保持する .env を同梱アセットとして読み込む。
    # .env はリポジトリにコミットしない（.gitignore 対象）。実行前に `.env.example` からコピーすること。
    - .env

# アプリアイコン設定（SOT-1513）。起動時スプラッシュ画面と同じ緑（ColorScheme.fromSeed(green).primary
# = #3B6939）背景に白の restaurant_menu アイコン。`dart run flutter_launcher_icons` で
# android/app/src/main/res 配下の mipmap（各密度＋adaptive）を再生成する。iOS/web ターゲットは無し。
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#3B6939"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21
